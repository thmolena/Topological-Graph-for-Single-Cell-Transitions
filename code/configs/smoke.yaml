# Smoke / demo configuration: runs in a few seconds on a laptop CPU.
# Numbers from this config are demo-scale (few hundred cells, one seed) -- the
# reported-scale numbers come from configs/full.yaml.
name: smoke
seed: 0
n_states: 400
n_features: 8
n_phase_branches: 3
n_devices: 4
n_shot_batches: 2
n_hamiltonians: 3
noise: 0.7
rare_fraction: 0.05
k: 15
label_fraction: 0.1
splits: [device, shot_batch, schedule, hamiltonian]
active_budget: 20
n_seeds: 1
# Spectral-truncated directed-diffusion operator + conformal calibration.
rank: 40
alpha: 0.9
beta: 1.0
eps: 0.6
tau: 0.2
conformal_delta: 0.1
cal_fraction: 0.4
