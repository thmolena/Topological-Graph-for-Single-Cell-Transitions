# Reported-scale configuration. More cells, more donors/conditions, and several
# seeds for tight confidence intervals. Runtime on a multi-core laptop CPU is on
# the order of a minute or two.
name: full
seed: 0
n_cells: 3000
n_features: 16
n_branches: 3
n_donors: 8
n_batches: 4
n_perturbations: 5
noise: 0.7
rare_fraction: 0.04
k: 20
label_fraction: 0.03
splits: [donor, batch, time, perturbation]
active_budget: 60
n_seeds: 5
